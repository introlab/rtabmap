name: 'Install Windows Dependencies'
description: 'Installs PCL, Qt, VTK, g2o, GTSAM, libpointmatcher and others'
runs:
  using: "composite"
  steps:
    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg_install
        key: ${{ runner.os }}-vcpkg-c93431c5

    - name: Download and Install vcpkg
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $install_dir = "${{ github.workspace }}\vcpkg_install"
        $archivePath = "${{ github.workspace }}\vcpkg-export-c93431c5.7z"

        # The file has been built locally with these commands (from a "x64 Native Tools Command Prompt for VS 2022"):
        #   git clone https://github.com/microsoft/vcpkg.git
        #   cd vcpkg
        #   git checkout ########### (use version in vcpkg.json of this repo)
        #   .\bootstrap-vcpkg.bat
        # 
        # In rtabmap folder (manifest mode using vcpkg.json in the repo, note that this command install in a vcpkg_installed subfolder of the repo, make sure you have >20 GB free, note also openni2 requires .NET Framework 4.7.2):
        #   C:\vcpkg\vcpkg.exe install --recurse --clean-after-build --triplet x64-windows-release --x-feature tools --x-feature k4w2 --x-feature octomap --x-feature openmp --x-feature realsense2 --x-feature openni2 --x-feature gtsam-deps --x-feature libpointmatcher-deps 
        #   C:\vcpkg\vcpkg.exe export --7zip --output-dir=.\vcpkg_binaries --host-triplet=x64-windows-release

        $url = "https://www.dropbox.com/scl/fi/3zksz0d1vdmhp7uj4mcfn/vcpkg-export-c93431c5.7z?rlkey=al7wsqe049ndtf36oanq9in2a&st=lz4g74q3&dl=1"

        Invoke-WebRequest -Uri $url -OutFile $archivePath
        & 7z x $archivePath "-o$install_dir" -y
        Write-Host "Contents of $install_dir :"
        Get-ChildItem -Path "$install_dir"

    - name: Add vcpkg to PATH and env variable
      shell: pwsh
      run: |
        #what are the commands to add env variable 
        $vcpkg_path = "${{ github.workspace }}/vcpkg_install/vcpkg-export-20260225-040358"
        echo "VCPKG_INSTALLATION_ROOT=$vcpkg_path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "VCPKG_TARGET_TRIPLET=x64-windows-release" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "$vcpkg_path/installed\x64-windows-release\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Cache GTSAM
      id: cache-gtsam
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/gtsam_install
        key: ${{ runner.os }}-gtsam-4.0.0-alpha2-${{ hashFiles('**/gtsam-4.0.0-alpha2-MSVC.patch') }}

    - name: Build and Install GTSAM
      if: steps.cache-gtsam.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $INSTALL_DIR = "${{ github.workspace }}/gtsam_install"
      
        git clone --branch 4.0.0-alpha2 https://github.com/borglab/gtsam.git
        $patchUrl = "https://gist.githubusercontent.com/matlabbe/f66f65540df61edee87d2aa2777e3a73/raw/f6fe0f9e56835fd5a735d954ecdd7453a3036892/gtsam-4.0.0-alpha2-MSVC.patch"
        curl -L $patchUrl -o gtsam-4.0.0-alpha2-MSVC.patch
        git -C gtsam apply ../gtsam-4.0.0-alpha2-MSVC.patch

        cmake -S gtsam -B gtsam/build `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DGTSAM_BUILD_EXAMPLES_ALWAYS=OFF `
          -DGTSAM_BUILD_TESTS=OFF `
          -DGTSAM_BUILD_STATIC_LIBRARY=ON `
          -DGTSAM_BUILD_UNSTABLE=OFF `
          -DGTSAM_INSTALL_CPPUNILITE=OFF `
          -DGTSAM_USE_SYSTEM_EIGEN=ON `
          -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" `
          -DCMAKE_PREFIX_PATH="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-release" `
          -DCMAKE_CXX_FLAGS="-DBOOST_TIMER_ENABLE_DEPRECATED -DBOOST_BIND_GLOBAL_PLACEHOLDERS"
        
        cmake --build gtsam/build --config Release --target install

    - name: Add GTSAM to PATH
      shell: pwsh
      run: |
        echo "${{ github.workspace }}/gtsam_install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    # libnabo is a dependency of libpointmatcher
    - name: Cache libnabo
      id: cache-libnabo
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/libnabo_install
        key: ${{ runner.os }}-libnabo-c925c47

    - name: Build and Install libnabo
      if: steps.cache-libnabo.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $INSTALL_DIR = "${{ github.workspace }}/libnabo_install"

        git clone https://github.com/ethz-asl/libnabo.git
        cd libnabo
        git checkout c925c47

        cmake -S . -B build `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_PREFIX_PATH="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-release" `
          -DSHARED_LIBS=ON `
          -DLIBNABO_BUILD_DOXYGEN=OFF `
          -DLIBNABO_BUILD_EXAMPLES=OFF `
          -DLIBNABO_BUILD_PYTHON=OFF `
          -DLIBNABO_BUILD_TESTS=OFF
        
        cmake --build build --config Release --target install

    - name: Add libnabo to PATH
      shell: pwsh
      run: |
        echo "${{ github.workspace }}/libnabo_install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Cache libpointmatcher
      id: cache-lpm
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/lpm_install
        key: ${{ runner.os }}-lpm-7dc58e5-${{ hashFiles('**/pointmatcher_windows_dll.patch') }}

    - name: Build and Install libpointmatcher
      if: steps.cache-lpm.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $INSTALL_DIR = "${{ github.workspace }}/lpm_install"

        git clone https://github.com/ethz-asl/libpointmatcher.git
        cd libpointmatcher
        git checkout 7dc58e5
        
        $patchUrl = "https://gist.githubusercontent.com/matlabbe/fabab6d0d0e0960dd94e8b633ad713cb/raw/7c99c2276765015134e06b45f9be35377101446a/pointmatcher_windows_dll.patch"
        curl -L $patchUrl -o ../pointmatcher_windows_dll.patch
        git apply ../pointmatcher_windows_dll.patch

        cmake -S . -B build `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_TESTS=OFF `
          -DCMAKE_PREFIX_PATH="$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows-release" `
          -DBUILD_SHARED_LIBS=ON `
          -DPOINTMATCHER_BUILD_EVALUATIONS=OFF `
          -DPOINTMATCHER_BUILD_EXAMPLES=OFF
        
        cmake --build build --config Release --target install

        # We remove the files in the top-level CMake directory to force use of share/libpointmatcher/cmake
        if (Test-Path "$INSTALL_DIR/CMake") {
            Remove-Item -Recurse -Force "$INSTALL_DIR/CMake"
        }

    - name: Add libpointmatcher to PATH
      shell: pwsh
      run: |
        echo "${{ github.workspace }}/lpm_install/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

        