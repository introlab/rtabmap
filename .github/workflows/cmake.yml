name: CMake

on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - '**'

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-latest]
        include:
        - os: ubuntu-22.04
          extra_deps: "libunwind-dev libceres-dev"
          extra_cmake_def: ""
        - os: ubuntu-24.04
          extra_deps: "libg2o-dev libceres-dev"
          extra_cmake_def: "-DWITH_CERES=ON"
        - os: windows-latest
          extra_deps: ""
          extra_cmake_def: '-DOpenCV_DIR="C:\Program Files\opencv\build" -DPCL_DIR="C:\Program Files\PCL\cmake" -DCPUTSDF_DIR="C:\Program Files\cpu_tsdf\share\cpu_tsdf" -Dyaml-cpp_DIR="C:\Program Files\yaml-cpp\CMake" -DBUILD_AS_BUNDLE=ON'

    steps:
    - name: Set up Python
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v5
    - name: Disable Windows Python App Alias
      if: matrix.os == 'windows-latest'
      run: |
        Remove-Item "$env:LOCALAPPDATA\Microsoft\WindowsApps\python.exe" -ErrorAction SilentlyContinue
        Remove-Item "$env:LOCALAPPDATA\Microsoft\WindowsApps\python3.exe" -ErrorAction SilentlyContinue
    - name: Install Qt
      if: matrix.os == 'windows-latest'
      uses: jurplel/install-qt-action@v4
      with:
        version: '5.10.1'
        target: 'desktop'
        arch: 'win64_msvc2015_64'
        cache: true
    - name: Install Boost
      if: matrix.os == 'windows-latest'
      uses: MarkusJx/install-boost@v2
      with:
        boost_version: 1.69.0
        version: legacy
        toolset: msvc14.1
        platform: win32
    - name: Set up MSVC Developer Command Prompt
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    - name: Install Windows dependencies
      if: matrix.os == 'windows-latest'
      run: |
        Write-Host "Installing dependencies..."
        # To download from google drive
        py -m pip --disable-pip-version-check install gdown>=5.1.0 
        # Openni2
        Write-Host "OpenNI2 not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/d98jv79l6oy9fxz/OpenNI2.exe?dl=0' -OutFile 'OpenNI2.exe'
        Start-Process -FilePath ".\OpenNI2.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed OpenNI2:"
        ls \"C:/Program Files/OpenNI2\"
        # OpenCV
        Write-Host "OpenCV not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/o6ofn491bc0jso1/opencv450_vc14.exe?dl=0' -OutFile 'opencv.exe'
        Start-Process -FilePath ".\opencv.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed OpenCV:"
        # VTK (including QVTK)
        Write-Host "VTK not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/1l33b5l3f3y52gf/VTK-6_3-msvc140.exe?dl=0' -OutFile 'VTK-6_3.exe'
        Start-Process -FilePath ".\VTK-6_3.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed VTK:"
        # QHull 
        Write-Host "Qhull not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/9widnk9msdsh2b8/Qhull-msvc140.exe?dl=0' -OutFile 'Qhull.exe'
        Start-Process -FilePath ".\Qhull.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed QHull:"
        ls \"C:/Program Files/Qhull\"
        # FLANN 
        Write-Host "FLANN not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/7k58jbmqa51sxmh/FLANN-msvc140.exe?dl=0' -OutFile 'FLANN.exe'
        Start-Process -FilePath ".\FLANN.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed FLANN:"
        ls \"C:/Program Files/FLANN\"
        # Eigen 
        Write-Host "Eigen not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/3v6i9i8dxj4o8ji/Eigen.exe?dl=0' -OutFile 'Eigen.exe'
        Start-Process -FilePath ".\Eigen.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed Eigen:"
        ls \"C:/Program Files/Eigen\"
        # PCL
        Write-Host "PCL not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/2iayr4lyqa50i9j/PCL_181_August2018_x64_vc14.exe?dl=0' -OutFile 'PCL_1.8.1.exe'
        Start-Process -FilePath ".\PCL_1.8.1.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed PCL:"
        ls \"C:/Program Files/PCL\"
        # zlib
        Write-Host "zlib not found in cache. Downloading and installing..."
        gdown -q 0B46akLGdg-uaYm9MTTI4MUtUcmc
        Expand-Archive zlib-1.2.8-vc2010-x64.zip -DestinationPath 'C:\Program Files'
        Write-Host "Installed zlib:"
        ls \"C:/Program Files/zlib\"
        # g2o
        Write-Host "g2o not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/ht74s5pa21wokzw/g2o.exe?dl=0' -OutFile 'g2o.exe'
        Start-Process -FilePath ".\g2o.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed g2o:"
        ls \"C:/Program Files/g2o\"
        # GTSAM
        Write-Host "GTSAM not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/0fpr6r4cgsqmvhf/GTSAM-4_0_0_alpha2-msvc140.exe?dl=0' -OutFile 'GTSAM.exe'
        Start-Process -FilePath ".\GTSAM.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed GTSAM:"
        ls \"C:/Program Files/GTSAM\"
        # OctoMap
        Write-Host "OctoMap not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/6jpxu0nm8ne6e54/octomap_x64_vc14.exe?dl=0' -OutFile 'octomap.exe'
        Start-Process -FilePath ".\octomap.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed OctoMap:"
        ls \"C:/Program Files/octomap-distribution\"
        # CPU-TSDF
        Write-Host "cpu_tsdf not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/mgges9va1uzxr0q/cpu_tsdf_sept2015_x64_vc14.exe?dl=0' -OutFile 'cpu_tsdf.exe'
        Start-Process -FilePath ".\cpu_tsdf.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed CPU-TSDF:"
        ls \"C:/Program Files/cpu_tsdf\"
        # Open Chisel
        Write-Host "open_chisel not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/0aaphcde4acrinm/open_chisel_x64_vc14.exe?dl=0' -OutFile 'open_chisel.exe'
        Start-Process -FilePath ".\open_chisel.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed Open Chisel:"
        ls \"C:/Program Files/open_chisel\"
        # yaml-cpp
        Write-Host "yaml-cpp not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://dl.dropboxusercontent.com/s/22qfvftwj6zq8tj/yaml-cpp_x64_vc14.exe?dl=0' -OutFile 'yaml-cpp.exe'
        Start-Process -FilePath ".\yaml-cpp.exe" -ArgumentList "-o`"C:\Program Files`" -y" -Wait
        Write-Host "Installed yaml-cpp:"
        ls \"C:/Program Files/yaml-cpp\"
        # RealSense2
        Write-Host "Intel RealSense SDK 2.0 not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://github.com/IntelRealSense/librealsense/releases/download/v2.40.0/Intel.RealSense.SDK-WIN10-2.40.0.2482.exe' -OutFile 'realsense2.exe'
        Start-Process -FilePath ".\realsense2.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
        Write-Host "Installed RealSense2:"
        ls \"C:/Program Files (x86)/Intel RealSense SDK 2.0\"
        # Kinect 4 Azure
        Write-Host "Azure Kinect SDK v1.4.1 not found in cache. Downloading and installing..."
        Invoke-WebRequest -Uri 'https://download.microsoft.com/download/3/d/6/3d6d9e99-a251-4cf3-8c6a-8e108e960b4b/Azure%20Kinect%20SDK%201.4.1.exe' -OutFile 'azure.exe'
        Start-Process -FilePath ".\azure.exe" -ArgumentList "/quiet /norestart" -Wait
        Write-Host "Installed Kinect For Azure:"
        ls \"C:/Program Files/Azure Kinect SDK v1.4.1\"
        # Setup the PATH
        Write-Host "Original PATH: %PATH%"
        # Qt
        # make sure Qt bin path is before cmake bin path to avoid copying qt5 dlls from cmake before qt installation
        echo "PATH=%QT_ROOT_DIR%\bin;%PATH%" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Boost
        echo "PATH=%PATH%;C:\Libraries\boost_1_62_0\boost" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Openni2
        echo "PATH=%PATH%;C:\Program Files\OpenNI2\Redist" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "OPENNI2_INCLUDE64=C:\Program Files\OpenNI2\Include" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "OPENNI2_LIB64=C:\Program Files\OpenNI2\Lib" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "OPENNI2_REDIST64=C:\Program Files\OpenNI2\Redist" | Out-File -FilePath $env:GITHUB_ENV -Append
        # OpenCV
        echo "PATH=%PATH%;C:\Program Files\opencv\x64\vc14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # VTK (including QVTK)
        echo "PATH=%PATH%;C:\Program Files\VTK\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # QHull 
        echo "PATH=%PATH%;C:\Program Files\Qhull\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # FLANN 
        echo "PATH=%PATH%;C:\Program Files\FLANN\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # PCL
        echo "PATH=%PATH%;C:\Program Files\PCL\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # zlib
        echo "PATH=%PATH%;C:\Program Files\zlib\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # g2o
        echo "PATH=%PATH%;C:\Program Files\g2o\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # GTSAM
        echo "PATH=%PATH%;C:\Program Files\GTSAM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # OctoMap
        echo "PATH=%PATH%;C:\Program Files\octomap-distribution\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # CPU-TSDF
        echo "PATH=%PATH%;C:\Program Files\cpu_tsdf\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Open Chisel
        echo "PATH=%PATH%;C:\Program Files\open_chisel\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # RealSense2
        echo "PATH=%PATH%;C:\Program Files (x86)\Intel RealSense SDK 2.0\bin\x64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "RealSense2_ROOT_DIR=C:\Program Files (x86)\Intel RealSense SDK 2.0" | Out-File -FilePath $env:GITHUB_ENV -Append
        # Kinect 4 Azure
        echo "PATH=%PATH%;C:\Program Files\Azure Kinect SDK v1.4.1\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "K4A_ROOT_DIR=C:\Program Files\Azure Kinect SDK v1.4.1" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "Updated PATH: %PATH%"
        
    - name: Install Linux dependencies
      if: matrix.os != 'windows-latest'
      run: |
        DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        sudo apt-get -y install libopencv-dev libpcl-dev git cmake software-properties-common libyaml-cpp-dev ${{ matrix.extra_deps }}

    - uses: actions/checkout@v4

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{ matrix.extra_cmake_def }}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Build Package
      if: matrix.os != 'windows-latest'
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Info
      working-directory: ${{github.workspace}}/build/bin
      run: |
        ./rtabmap-console --version

    - name: Upload RTABMap Artifacts
      if: matrix.os != 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: RTABMap-Binaries           # Give your artifact a recognizable name
        path: build/RTABMap-*            # Supports wildcards for files and directories
        if-no-files-found: warn          # Optional: warn, error, or ignore

#    - name: Test
#      working-directory: ${{github.workspace}}/build
#      # Execute tests defined by the CMake configuration.  
#      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
#      run: ctest -C ${{env.BUILD_TYPE}}
      
