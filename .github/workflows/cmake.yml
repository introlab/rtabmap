name: CMake

on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - '**'

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-latest]
        include:
        - os: ubuntu-22.04
          extra_deps: "libunwind-dev libceres-dev"
          extra_cmake_def: ""
        - os: ubuntu-24.04
          extra_deps: "libg2o-dev libceres-dev"
          extra_cmake_def: "-DWITH_CERES=ON"
        - os: windows-latest
          extra_deps: ""
          extra_cmake_def: '-DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/vcpkg/scripts/buildsystems/vcpkg.cmake -DBUILD_AS_BUNDLE=ON'

    steps:
    - uses: actions/checkout@v4

    - name: Install VCPKG Windows Dependencies
      if: matrix.os == 'windows-latest'
      uses: lukka/run-vcpkg@v11
      id: runvcpkg
      with:
        runVcpkgInstall: true
        runVcpkgFormatString: '[`install`, `--recurse`, `--clean-after-build`, `--x-install-root`, `$[env.VCPKG_INSTALLED_DIR]`, `--triplet`, `$[env.VCPKG_DEFAULT_TRIPLET]`, `--x-feature`, `tools`, `--x-feature`, `k4w2`, `--x-feature`, `octomap`, `--x-feature`, `openmp`, `--x-feature`, `openni2`, `--x-feature`, `realsense2`, `--x-feature`, `gtsam-deps`, `--x-feature`, `libpointmatcher-deps`]'
    - name: Prints output of run-vcpkg's action.
      if: matrix.os == 'windows-latest'
      run: echo "root='${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}', triplet='${{ steps.runvcpkg.outputs.RUNVCPKG_VCPKG_DEFAULT_TRIPLET_OUT }}' "
    - name: Install custom Windows Dependencies
      if: matrix.os == 'windows-latest'
      uses: ./.github/actions/install-windows-deps

    - name: Install Linux Dependencies
      if: matrix.os != 'windows-latest'
      run: |
        DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        sudo apt-get -y install libopencv-dev libpcl-dev git cmake software-properties-common libyaml-cpp-dev ${{ matrix.extra_deps }}

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{ matrix.extra_cmake_def }} -DPSAPI_LIBRARIES="$env:PSAPI_PATH"

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Build Package
      if: matrix.os == 'windows-latest'
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target package

    - name: Info
      working-directory: ${{github.workspace}}/build/bin
      run: |
        ./rtabmap-console --version

    - name: Upload RTABMap Artifacts
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: RTABMap-Binaries           # Give your artifact a recognizable name
        path: build/RTABMap-*            # Supports wildcards for files and directories
        if-no-files-found: warn          # Optional: warn, error, or ignore

#    - name: Test
