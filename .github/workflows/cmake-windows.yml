name: CMake-Windows

on:
  push:
    branches: 
      - master
  pull_request:
    branches: 
      - '**'

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ${{ matrix.build_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        build_name: [windows-2022, windows-2022-cuda]
        include:
        - build_name: windows-2022
          os: windows-2022
          extra_deps: ""
          extra_cmake_def: '-DBUILD_AS_BUNDLE=ON -DWITH_PYTHON=ON -DWITH_TORCH=OFF'
        - build_name: windows-2022-cuda
          os: windows-2022
          extra_deps: ""
          extra_cmake_def: '-DBUILD_AS_BUNDLE=ON -DWITH_PYTHON=ON -DWITH_TORCH=ON'

    steps:
    - uses: actions/checkout@v4

    - name: Restore test data
      id: cache-testdata
      uses: actions/cache@v4
      with:
        # SQLite DBs are binary-portable -> share the cache across
        # linux / macos / windows. Key omits runner.os on purpose so all
        # three OSes hit the same entry.
        path: data/tests/*.db
        key: testdata-${{ hashFiles('data/tests/manifest.txt') }}

    - name: Fetch test data
      if: steps.cache-testdata.outputs.cache-hit != 'true'
      shell: bash
      run: bash scripts/fetch_test_data.sh

    - name: Install Windows Dependencies
      if: matrix.build_name == 'windows-2022'
      uses: ./.github/actions/install-windows-deps
 
    - name: Install Windows Dependencies with CUDA
      if: matrix.build_name == 'windows-2022-cuda'
      uses: ./.github/actions/install-windows-cuda-deps

    - name: Configure CMake
      run: |
        cmake `
          -B ${{github.workspace}}/build `
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} `
          ${{ matrix.extra_cmake_def }} `
          -DBUILD_TESTING=ON `
          -DVCPKG_MANIFEST_INSTALL=OFF `
          -DVCPKG_TARGET_TRIPLET=x64-windows-release `
          -DVCPKG_INSTALLED_DIR="${{env.VCPKG_EXPORT_PATH}}/installed" `
          -DCMAKE_TOOLCHAIN_FILE=${{env.VCPKG_EXPORT_PATH}}/scripts/buildsystems/vcpkg.cmake `
          -DTorch_DIR=${{env.VCPKG_EXPORT_PATH}}/installed/x64-windows-release/tools/python3/Lib/site-packages/torch/share/cmake/Torch

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target ALL_BUILD

    # Diagnostic for test_util3d_features hanging on the CUDA build.
    # Compares startup time with/without the GPU visible and lists the DLL
    # graph against a reference test (test_localgrid) that runs fine.
    # Non-fatal: keeps going even if a step times out so the timings still
    # show up in the log.
    - name: Diagnose test_util3d_features startup (CUDA only)
      if: matrix.build_name == 'windows-2022-cuda'
      shell: pwsh
      working-directory: ${{github.workspace}}/build
      continue-on-error: true
      env:
        PYTHONHOME: ${{env.VCPKG_EXPORT_PATH}}/installed/x64-windows-release/tools/python3
        PYTHONNOUSERSITE: 1
      run: |
        function Measure-Listing($exe, $envOverride) {
          $job = Start-Job -ScriptBlock {
            param($exe, $envOverride)
            if ($envOverride) { $env:CUDA_VISIBLE_DEVICES = $envOverride }
            $sw = [System.Diagnostics.Stopwatch]::StartNew()
            & $exe --gtest_list_tests *> $null
            $sw.Stop()
            [pscustomobject]@{ Seconds = $sw.Elapsed.TotalSeconds; ExitCode = $LASTEXITCODE }
          } -ArgumentList $exe, $envOverride
          if (Wait-Job $job -Timeout 120) {
            $r = Receive-Job $job
            "{0,7:F2}s exit={1}" -f $r.Seconds, $r.ExitCode
          } else {
            Stop-Job $job; Remove-Job $job -Force
            ">120s (timed out)"
          }
        }
        $exe = "${{github.workspace}}\build\bin\test_util3d_features.exe"
        $ref = "${{github.workspace}}\build\bin\test_localgrid.exe"
        Write-Host "=== --gtest_list_tests timing ==="
        Write-Host ("test_util3d_features (GPU visible)    : " + (Measure-Listing $exe $null))
        Write-Host ("test_util3d_features (CUDA hidden)    : " + (Measure-Listing $exe ""))
        Write-Host ("test_localgrid       (GPU visible)    : " + (Measure-Listing $ref $null))
        Write-Host ("test_localgrid       (CUDA hidden)    : " + (Measure-Listing $ref ""))
        Write-Host ""
        Write-Host "=== DLL graph delta (util3d_features minus localgrid) ==="
        $u = & dumpbin /dependents $exe | Select-String -Pattern '\.dll' | ForEach-Object { $_.ToString().Trim().ToLower() } | Sort-Object -Unique
        $l = & dumpbin /dependents $ref | Select-String -Pattern '\.dll' | ForEach-Object { $_.ToString().Trim().ToLower() } | Sort-Object -Unique
        $onlyU = Compare-Object $u $l | Where-Object { $_.SideIndicator -eq '<=' } | ForEach-Object { $_.InputObject }
        if ($onlyU) { $onlyU | ForEach-Object { Write-Host "  +$_" } } else { Write-Host "  (identical)" }

    - name: Test
      working-directory: ${{github.workspace}}/build
      # PYTHONHOME points the embedded interpreter at vcpkg's bundled
      # Python install (where Lib/, DLLs/ live). Without it Python emits
      # "Could not find platform independent libraries <prefix>" at init
      # and runs without a stdlib, breaking every numpy import.
      # PYTHONNOUSERSITE=1: prevent the embedded Python interpreter from
      # loading numpy / other site-packages from %APPDATA%\Python that
      # were compiled against a different ABI than the build-time Python
      # (numpy 1.x/2.x mismatch crashes in test_pydetector /
      # test_pydescriptor / test_pymatcher).
      env:
        PYTHONHOME: ${{env.VCPKG_EXPORT_PATH}}/installed/x64-windows-release/tools/python3
        PYTHONNOUSERSITE: 1
      run: |
        ctest -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 300
        ctest -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 300 --rerun-failed

    - name: Build Windows Package
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "pull_request") {
          cpack --config build/CPackConfig.cmake -G ZIP -B build
        } else {
          cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }} --target package
        }

    - name: Rename CUDA artifacts
      if: matrix.build_name == 'windows-2022-cuda'
      shell: pwsh
      run: Get-ChildItem -Path "build" -Filter "RTABMap-*" | Rename-Item -NewName { $_.BaseName + "_cuda" + $_.Extension }

    - name: Info
      working-directory: ${{github.workspace}}/build/bin
      run: |
        ./rtabmap-console --version

    - name: Upload RTABMap Artifacts (ZIP)
      uses: actions/upload-artifact@v4
      with:
        name: RTABMap-Binaries-${{ matrix.build_name }}-zip
        path: |
          build/RTABMap-*.zip
        compression-level: 0
        if-no-files-found: warn
        retention-days: ${{ github.event_name == 'pull_request' && 1 || 90 }}

    - name: Upload RTABMap Artifacts (Installer)
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: RTABMap-Binaries-${{ matrix.build_name }}-exe
        path: |
          build/RTABMap-*.exe
        compression-level: 0
        if-no-files-found: warn
        retention-days: ${{ github.event_name == 'pull_request' && 1 || 90 }}
